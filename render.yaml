# Render Blueprint — static frontend only.
# Backend (API + MCP) runs on AWS EC2 — see DEPLOY.md and deploy/aws/

services:
  - type: web
    name: financial-model-dashboard
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: VITE_APP_URL
        value: https://financial-model-dashboard.onrender.com
      - key: VITE_API_URL
        sync: false
      - key: VITE_PUBLIC_MCP_URL
        sync: false
