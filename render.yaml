# Render Blueprint — static frontend only.
# Backend (API + MCP) runs on Oracle Always Free VM — see deploy/oracle/ and .cursor/skills/deploy-render-oracle/

services:
  - type: web
    name: financial-model-dashboard
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: VITE_API_URL
        sync: false
      - key: VITE_PUBLIC_MCP_URL
        sync: false
